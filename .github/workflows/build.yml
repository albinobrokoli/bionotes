name: Build BioNotes (macOS)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-tauri:
    name: Build .dmg (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bionotes-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./bionotes-app/src-tauri -> target"
          key: ${{ matrix.target }}

      - name: Install npm dependencies
        working-directory: bionotes-app
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: bionotes-app
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "BioNotes ${{ github.ref_name }}"
          releaseBody: |
            BioNotes masaüstü uygulaması — otomatik üretilen .dmg bundle.
            Apple Silicon (arm64) ve Intel (x86_64) mimariler için ayrı dosyalar.
          releaseDraft: true
          prerelease: false
